name: 🚀 Feature request
title: '[FEATURE]: '
description: Propose a feature for "Get Data from Steam / SteamDB" userscript.
labels:
  - pending triage
type: feature

body:
  - type: markdown
    attributes:
      value: |
        ### Before you start
        Please share enough detail to evaluate scope, value, and implementation effort.

  - type: markdown
    attributes:
      value: |
        ### Proposal details
        Explain what problem this solves, your proposed solution, and expected user impact.

  - type: textarea
    id: feature-summary
    attributes:
      label: Feature summary
      description: |
        Provide a short and clear summary of the requested feature.
      placeholder: |
        Example: Add export support for SteamDB DLC lists (DLC name, AppID, release date, and price).
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
      description: |
        Describe the current limitation or pain point this feature would solve.
      placeholder: |
        Today I have to open the DLC tab on each SteamDB app page and copy DLC data manually.
    validations:
      required: true

  - type: textarea
    id: suggested-solution
    attributes:
      label: Suggested Solution
      description: |
        Describe how this feature could work from a user perspective.
      placeholder: |
        Add an "Export DLC" action in the existing panel to collect and format rows from the SteamDB DLC table.
    validations:
      required: true

  - type: textarea
    id: expected-benefit
    attributes:
      label: Expected benefit
      description: |
        Explain the expected outcome and who benefits from this feature.
      placeholder: |
        This would speed up DLC analysis and reduce manual copy/paste errors for data collection workflows.
    validations:
      required: true

  - type: dropdown
    id: feature-scope
    attributes:
      label: Feature scope
      description: |
        Which area is mainly affected by this proposal?
      options:
        - Steam
        - SteamDB
        - Both
        - Not sure
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Related pages (optional)
        If relevant, provide one or both URLs.

  - type: input
    id: steam-url
    attributes:
      label: Steam URL (optional)
      placeholder: |
        e.g., https://store.steampowered.com/app/620980

  - type: input
    id: steamdb-url
    attributes:
      label: SteamDB URL (optional)
      placeholder: |
        e.g., https://steamdb.app/app/620980/

  - type: textarea
    id: alternative-solutions
    attributes:
      label: Alternative solutions
      description: |
        Describe alternatives you considered and why this proposal is preferable.
      placeholder: |
        I considered manual copy from the SteamDB DLC table, but it is slow and error-prone for large app catalogs.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: |
        How important is this feature for your workflow?
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: |
        Add any other helpful information, like screenshots or links.
      placeholder: |
        ...

  - type: checkboxes
    id: validations
    attributes:
      label: Validations
      description: 'Before submitting this feature request, please confirm the following:'
      options:
        - label: I have searched for existing feature requests and did not find a duplicate.
          required: true
        - label: I am using the latest available "Get Data from Steam / SteamDB" userscript version.
          required: true
